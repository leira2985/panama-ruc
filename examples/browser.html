<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>panama-ruc | Validador en navegador</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 600px;
      margin: 60px auto;
      padding: 20px;
      color: #222;
    }
    h1 { font-size: 24px; margin-bottom: 24px; }
    input {
      width: 100%;
      padding: 12px 16px;
      font-size: 18px;
      font-family: ui-monospace, "SF Mono", monospace;
      border: 2px solid #ddd;
      border-radius: 8px;
      outline: none;
    }
    input:focus { border-color: #2563eb; }
    .result {
      margin-top: 20px;
      padding: 20px;
      border-radius: 8px;
      font-family: ui-monospace, monospace;
      white-space: pre;
    }
    .ok { background: #d1fae5; color: #065f46; }
    .err { background: #fee2e2; color: #991b1b; }
    footer { margin-top: 40px; color: #666; font-size: 14px; }
  </style>
</head>
<body>
  <h1>🇵🇦 Validador de RUC</h1>
  <input type="text" id="ruc" placeholder="Ejemplo: 8-783-1657" autofocus>
  <div id="result" class="result" style="display:none"></div>

  <footer>
    Powered by <a href="https://github.com/leira2985/panama-ruc">@workflow507/panama-ruc</a>
  </footer>

  <script type="module">
    import { parse, safeParse } from "https://esm.sh/@workflow507/panama-ruc";

    const input = document.getElementById("ruc");
    const result = document.getElementById("result");

    input.addEventListener("input", () => {
      const value = input.value.trim();
      if (!value) {
        result.style.display = "none";
        return;
      }

      const r = safeParse(value);
      result.style.display = "block";

      if (r.ok) {
        result.className = "result ok";
        result.textContent = `✓ DV: ${r.value.dv}
Tipo: ${r.value.type}
Completo: ${r.value.fullId}
${r.value.type === "natural" && r.value.provincia ? `Provincia: ${r.value.provincia.nombre}` : ""}`;
      } else {
        result.className = "result err";
        result.textContent = `✗ ${r.error.message}
Código: ${r.error.code}`;
      }
    });
  </script>
</body>
</html>
